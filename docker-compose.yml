services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    env_file:
      - .env.production
    volumes:
      - ai-cache:/app/ai-cache
    restart: unless-stopped
    mem_limit: 1g
    memswap_limit: -1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  ai-cache:
